name: Docker Container for Ubuntu 25.10

on:
  workflow_dispatch:
    inputs:
      gh_actor_message:
        default: Test
        required: true
        description: Actor message
        type: string
      gh_debug_proceeds_print_dockerhub_credential:
        description: 'proceeds print_dockerhub_credential'
        required: true
        type: boolean
  pull_request:        
  push:
    paths:
      - "ubuntu2510/**"
      - ".github/workflows/docker-image_ubuntu2510.yml"
      - "https://github.com/n138-kz/Dockerfile.ubuntu.scripts/**"

permissions:
  contents: read

env:
  base-working-directory: ubuntu2510
  container-image-tag-name-1: 2510
  container-image-tag-name-2: 25
  container-image-tag-name-3: 25.10
  yt-dlp-version: 2026.03.17

jobs:
  send_github_context:
    uses: n138-kz/n138-kz/.github/workflows/github-act_send_github_context.yml@main
    secrets: inherit # pass all secrets

  docker_login:
    uses: n138-kz/n138-kz/.github/workflows/github-act_docker_login.yml@main
    secrets: inherit # pass all secrets

  upload_secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export to json
        run: echo '${{ toJSON(env) }}' | jq -c | tee payload.json

      - name: Upload file
        uses: actions/upload-artifact@v4
        with:
          name: payload-env
          path: payload.json

      - name: Export to json
        run: echo '${{ toJSON(github) }}' | jq -c | tee payload.json

      - name: Upload file
        uses: actions/upload-artifact@v4
        with:
          name: payload-github
          path: payload.json

      - name: Export to json
        run: echo '${{ toJSON(secrets) }}' | jq -c | tee payload.json

      - name: Upload file
        uses: actions/upload-artifact@v4
        with:
          name: payload-secrets
          path: payload.json

  print_dockerhub_credential:
    runs-on: ubuntu-latest
    needs: docker_login
    if: ${{ inputs.gh_debug_proceeds_print_dockerhub_credential }}

    steps:
      - uses: actions/checkout@v4

      - name: Send Discord
        env:
          discord_avatar_url: https://github.githubassets.com/assets/GitHub-Mark-ea2971cee799.png
          discord_username: Github-Actions
        run: |
          curl -X POST \
            -H 'Content-Type:application/json' \
            -d '{"avatar_url":"${{ env.discord_avatar_url }}","username":"${{ env.discord_username }}","embeds":[{"title":"docker-hub","url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","color":'$((16#ffa500))',"description":"[[${{ github.event.repository.name }}]](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) || ${{ secrets.docker_credential_password }} ||"}]}' \
            ${{ secrets.discord_webhook_url }} | jq;

  iso8601:
    runs-on: ubuntu-latest
    outputs:
      iso_date: ${{ steps.set_date.outputs.iso_date }}
    steps:
      - name: Set ISO 8601 date as an environment variable
        id: set_date
        run: |
          echo "ISO_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          
      - name: Use the ISO 8601 date variable
        run: |
          echo "::notice title=ISO 8601 Date::The current ISO 8601 date is: ${{ steps.set_date.outputs.iso_date }}"
          echo "The current ISO 8601 date is: ${{ steps.set_date.outputs.iso_date }}"

  PreCheck_Dockerfile_ubuntu_scripts:
    needs: iso8601
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cloning the `Dockerfile.ubuntu.scripts`
        working-directory: ${{ env.base-working-directory }}
        run: git clone https://github.com/n138-kz/Dockerfile.ubuntu.scripts.git scripts && rm -fr scripts/.*

      - name: Display the Tree
        run: tree -a

  PreCheck_yt-dlp:
    needs: iso8601
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Creating the directory=scripts
        working-directory: ${{ env.base-working-directory }}
        run: mkdir scripts

      - name: Cloning the `yt-dlp`
        working-directory: ${{ env.base-working-directory }}/scripts
        run: curl -s -L https://github.com/yt-dlp/yt-dlp/releases/download/${{ env.yt-dlp-version }}/yt-dlp -o yt-dlp && chmod +x yt-dlp

      - name: Display the Tree
        run: tree -a

  build:
    needs: 
      - iso8601
      - PreCheck_Dockerfile_ubuntu_scripts
      - PreCheck_yt-dlp

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Cloning the `Dockerfile.ubuntu.scripts`
        working-directory: ${{ env.base-working-directory }}
        # scripts/.* is for removing .git and .github folders
        run: git clone https://github.com/n138-kz/Dockerfile.ubuntu.scripts.git scripts && rm -fr scripts/.*

      - name: Cloning the `yt-dlp`
        working-directory: ${{ env.base-working-directory }}/scripts
        run: curl -s -L https://github.com/yt-dlp/yt-dlp/releases/download/${{ env.yt-dlp-version }}/yt-dlp -o yt-dlp && chmod +x yt-dlp

      - name: Display the Tree
        working-directory: ${{ env.base-working-directory }}
        run: tree -a

      - name: Build the Image
        working-directory: ${{ env.base-working-directory }}
        run: |
          docker build \
          --no-cache \
          --progress=plain \
          --build-arg build_at=${{ needs.iso8601.outputs.iso_date }} \
          --tag ${{ vars.docker_credential_username }}/ubuntu:buildat_$(date +%Y%m%d) \
          --tag ${{ vars.docker_credential_username }}/ubuntu:${{ env.container-image-tag-name-1 }} \
          --tag ${{ vars.docker_credential_username }}/ubuntu:${{ env.container-image-tag-name-2 }} \
          --tag ${{ vars.docker_credential_username }}/ubuntu:${{ env.container-image-tag-name-3 }} \
          .

      - name: Inspect the Image
        run: docker inspect ${{ vars.docker_credential_username }}/ubuntu:${{ env.container-image-tag-name-1 }} | jq

      - name: Check env
        run: docker run --rm ${{ vars.docker_credential_username }}/ubuntu:${{ env.container-image-tag-name-1 }} env

      - name: Print PATH
        run: docker run --rm ${{ vars.docker_credential_username }}/ubuntu:${{ env.container-image-tag-name-1 }} printenv PATH

      - name: docker login
        run: docker login --username ${{ vars.docker_credential_username }} --password ${{ secrets.docker_credential_password }}

      - name: Image push
        run: docker push --all-tags ${{ vars.docker_credential_username }}/ubuntu
